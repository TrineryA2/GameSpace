<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GameSpace</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header>
    <div class="logo">GameSpace</div>
    <div class="header-actions">
      <button class="header-btn" id="btnViewToggle" title="Toggle view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button class="header-btn" id="btnDarkMode" title="Dark mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <div class="content" id="contentArea">
    <div style="padding:20px;text-align:center;">
      <h2 style="color:var(--text);">Loading...</h2>
      <p style="color:var(--text-secondary);">If you see this message, JavaScript is not running.</p>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-tab active" data-page="library" id="navLibrary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
      Library
    </button>
    <button class="nav-tab" data-page="collections" id="navCollections">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
      Collections
    </button>
    <button class="nav-tab" data-page="search" id="navSearch">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search
    </button>
    <button class="nav-tab" id="navAdd">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add
    </button>
    <button class="nav-tab" data-page="settings" id="navSettings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Settings
    </button>
  </nav>
</div>

<div class="overlay-bg" id="overlayBg" onclick="closeDetail()"></div>
<div class="detail-sheet" id="detailSheet">
  <img id="dCover" src="" alt="" style="display:none;">
  <div id="dPlaceholder" style="width:100%;height:160px;background:var(--surface2);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  </div>
  <div class="detail-name" id="dName"></div>
  <div class="detail-row"><span class="detail-label">Platform</span><span class="detail-value" id="dPlatform"></span></div>
  <div class="detail-row"><span class="detail-label">Emulator</span><span class="detail-value" id="dEmulator"></span></div>
  <div class="detail-row"><span class="detail-label">Performance</span><span class="detail-value" id="dPerf"></span></div>
  <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value" id="dStatus"></span></div>
  <div class="detail-row"><span class="detail-label">Rating</span><span class="detail-value" id="dRating"></span></div>
  <div class="detail-notes" id="dNotes"></div>
  <div class="detail-actions">
    <button onclick="closeDetail()">Close</button>
    <button class="primary" id="dEditBtn">Edit</button>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 id="editModalTitle">Add Game</h3>
    <div class="form-group"><label>Title *</label><input type="text" id="fTitle" placeholder="Game name"></div>
    <div class="form-group"><label>Cover Image</label><input type="file" id="fCoverFile" accept="image/*"></div>
    <div class="form-group"><label>Platform</label>
      <select id="fPlatform">
        <option value="">Select</option>
        <option>GBA</option><option>GBC</option><option>NDS</option><option>3DS</option>
        <option>PS1</option><option>PSP</option><option>N64</option><option>SNES</option>
        <option>NES</option><option>Dreamcast</option><option>Neo Geo</option>
        <option>MS-DOS</option><option>GameCube</option><option>Wii</option>
        <option>RPG Maker</option><option>Android</option><option>HTML5</option>
      </select>
    </div>
    <div class="form-group"><label>Emulator</label>
      <select id="fEmulator">
        <option value="">Select</option>
        <option>My Boy!</option><option>Pizza Boy GBA</option><option>Drastic</option>
        <option>Citra MMJ</option><option>ePSXe</option><option>DuckStation</option>
        <option>PPSSPP</option><option>M64Plus FZ</option><option>Snes9x EX+</option>
        <option>Nostalgia.NES</option><option>Redream</option><option>Flycast</option>
        <option>NeoDroid</option><option>Magic DosBox</option><option>Dolphin MMJ</option>
        <option>JoiPlay</option><option>ScummVM</option><option>MAME4droid</option>
        <option>RetroArch</option><option>Native</option><option>Browser</option>
      </select>
    </div>
    <div class="form-group"><label>Performance</label>
      <select id="fPerformance">
        <option value="">Select</option>
        <option>Perfect</option><option>Good</option><option>Playable</option>
        <option>Laggy</option><option>Unplayable</option>
      </select>
    </div>
    <div class="form-group"><label>Status</label>
      <select id="fStatus">
        <option value="">Select</option>
        <option>Playing</option><option>Completed</option><option>Backlog</option><option>Dropped</option>
      </select>
    </div>
    <div class="form-group"><label>Rating</label>
      <div class="star-picker" id="starPicker">
        <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
      </div>
    </div>
    <div class="form-group"><label>Favorite</label>
      <div id="fFavorite" style="font-size:24px;cursor:pointer;color:var(--text-secondary);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
    </div>
    <div class="form-group"><label>Collection</label><select id="fCollection"><option value="">None</option></select></div>
    <div class="form-group"><label>Notes</label><textarea id="fNotes" placeholder="Notes..."></textarea></div>
    <div class="form-actions">
      <button class="danger hidden" id="btnDelete">Delete</button>
      <button onclick="closeEditModal()">Cancel</button>
      <button class="primary" id="btnSave">Save</button>
    </div>
  </div>
</div>

<script src="core.js"></script>
<script src="app.js"></script>
</body>
</html>
